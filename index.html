<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe6ee,#fff5f7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}
.container{padding:20px;}
h1{color:#ff4d88;margin-bottom:20px;}
h2{color:#444;margin:15px 0;}
button{
padding:12px 24px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
margin:10px;
}
.yes-btn{background:#ff4d88;color:white;}
.no-btn{background:#ddd;position:absolute;}
input{
padding:12px;
width:280px;
border:1px solid #ccc;
border-radius:8px;
margin:10px;
font-size:16px;
}
.heart{
position:fixed;
font-size:24px;
animation:floatUp 4s linear forwards;
}
@keyframes floatUp{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-100px);opacity:0;}
}
</style>
</head>
<body>

<div class="container" id="content">
<h1>❤️ Would You Like To Go On A Date With Me? ❤️</h1>

<button class="yes-btn" onclick="showForm()">Yes 💕</button>
<button class="no-btn" id="noBtn">No 😢</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
const x = Math.random() * (window.innerWidth - 120);
const y = Math.random() * (window.innerHeight - 80);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
});

function showForm(){
document.getElementById("content").innerHTML = `
<h1>Yay! ❤️</h1>
<h2>Select Our Date Details 🥰</h2>

<input type="date" id="date"><br>

<input type="text" id="place" placeholder="Enter your favorite place 📍"><br>

<button class="yes-btn" onclick="confirmDate()">
Confirm Date ❤️
</button>`;
}

function confirmDate(){

const date = document.getElementById("date").value;
const place = document.getElementById("place").value;

if(!date || !place){
alert("Please select a date and place ❤️");
return;
}

document.getElementById("content").innerHTML = `
<h1>🎉 DATE CONFIRMED ❤️</h1>

<h2>📅 ${date}</h2>
<h2>📍 ${place}</h2>

<img src="https://media.tenor.com/Z6gmDPeM6dgAAAAC/happy-dog.gif"
width="320">

<h2>🐶 I'm so happy you said YES!</h2>
<p style="font-size:20px;margin-top:15px;">
Can't wait to see you ❤️🥰
</p>`;

confetti({
particleCount:250,
spread:120,
origin:{y:0.6}
});

setInterval(createHeart,300);

const message =
`Hi Moses ❤️

I said YES! 🥰

📅 Date: ${date}

📍 Place: ${place}

Can't wait to see you ❤️`;

setTimeout(() => {
window.open(
`https://wa.me/919952099176?text=${encodeURIComponent(message)}`,
"_blank"
);
}, 1500);
}

function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤️";
heart.style.left = Math.random() * 100 + "vw";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 4000);
}
</script>

</body>
</html>
